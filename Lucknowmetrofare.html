<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lucknow Metro Fare Calculator</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
}

.container {
    width: 400px;
    padding: 30px;
    border-radius: 20px;
    backdrop-filter: blur(15px);
    background: rgba(255, 255, 255, 0.08);
    box-shadow: 0 15px 40px rgba(0,0,0,0.4);
    color: white;
    animation: fadeIn 1s ease;
}

h2 {
    text-align: center;
    margin-bottom: 25px;
    letter-spacing: 1px;
}

label {
    font-size: 14px;
    opacity: 0.8;
}

select {
    width: 100%;
    padding: 10px;
    margin: 8px 0 15px 0;
    border-radius: 8px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.15);
    color: white;
}

select option {
    color: black;
}

button {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(90deg, #00c6ff, #0072ff);
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s ease;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px #00c6ff;
}

.swap {
    margin: 10px 0;
    text-align: center;
    cursor: pointer;
    font-size: 14px;
    opacity: 0.8;
    transition: 0.3s;
}

.swap:hover {
    opacity: 1;
    color: #00c6ff;
}

.result {
    margin-top: 20px;
    padding: 15px;
    border-radius: 10px;
    background: rgba(0, 0, 0, 0.3);
    text-align: center;
    font-size: 18px;
    min-height: 60px;
    transition: 0.4s;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="container">
    <h2>🚆 Lucknow Metro Fare</h2>

    <label>From</label>
    <select id="source"></select>

    <div class="swap" onclick="swapStations()">⇅ Swap Stations</div>

    <label>To</label>
    <select id="destination"></select>

    <button onclick="calculateFare()">Calculate Fare</button>

    <div class="result" id="result">Select stations to see fare</div>
</div>

<script>
const stations = [
    "CCS Airport", "Amausi", "Transport Nagar", "Krishna Nagar",
    "Singar Nagar", "Alambagh", "Alambagh Bus Stand", "Mawaiya",
    "Durgapuri", "Charbagh", "Hussain Ganj", "Sachivalaya",
    "Hazrat Ganj", "KD Singh Stadium", "Vishwavidyalaya",
    "IT College", "Badshah Nagar", "Lekhra Market",
    "Bhootnath Market", "Indira Nagar", "Munshi Pulia"
];

const sourceSelect = document.getElementById("source");
const destSelect = document.getElementById("destination");
const resultDiv = document.getElementById("result");

stations.forEach((station, index) => {
    sourceSelect.add(new Option(station, index));
    destSelect.add(new Option(station, index));
});

function getFare(n) {
    if (n == 0) return 0;
    else if (n == 1) return 10;
    else if (n == 2) return 15;
    else if (n >= 3 && n <= 6) return 20;
    else if (n >= 7 && n <= 9) return 30;
    else if (n >= 10 && n <= 13) return 40;
    else if (n >= 14 && n <= 17) return 50;
    else return 60;
}

function calculateFare() {
    let source = parseInt(sourceSelect.value);
    let destination = parseInt(destSelect.value);

    if (source === destination) {
        resultDiv.innerHTML = "⚠ Please select different stations";
        return;
    }

    let stationsTravelled = Math.abs(destination - source);
    let fare = getFare(stationsTravelled);

    resultDiv.innerHTML = `
        Stations Travelled: <b>${stationsTravelled}</b><br>
        Fare: <b>₹${fare}</b>
    `;
}

function swapStations() {
    let temp = sourceSelect.value;
    sourceSelect.value = destSelect.value;
    destSelect.value = temp;
}
</script>

</body>
</html>
